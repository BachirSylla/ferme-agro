# Config Supabase minimale pour AGRO ELITE.
#
# Recommandé : une fois la CLI installée, lance `supabase init` dans un dossier
# temporaire pour récupérer le config.toml CANONIQUE de ta version de CLI, puis
# recopie simplement le project_id ci-dessous. Les fichiers de supabase/migrations/
# seront pris automatiquement par `supabase db push` — ce sont eux qui comptent.

project_id = "agro-elite"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15          # Postgres local. Aligne sur ta version Supabase hébergée.

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"   # URL du dev Vite
